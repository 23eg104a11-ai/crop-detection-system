<!DOCTYPE html>
<html>
<head>
    <title>Smart Crop AI 🌿</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #e3f2fd; /* 🌤️ clean sky blue */
            overflow: hidden;
        }

        /* 🌞 SUN (LEFT SIDE) */
        .sun {
            position: absolute;
            top: 60px;
            left: 60px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff176, #fbc02d);
            border-radius: 50%;
            box-shadow: 0 0 70px rgba(255, 235, 59, 0.8);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* 🌍 GROUND ONLY (BOTTOM) */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 38%;
            background: linear-gradient(#a97457, #6d4c41);
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.3);
        }

        /* 🌾 FIELD */
        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 38%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 20px;
        }

        /* 🌿 CROPS */
        .crop {
            width: 5px;
            background: linear-gradient(#2e7d32, #66bb6a);
            border-radius: 5px;
            position: relative;
            transform-origin: bottom;
            animation: sway 3s infinite ease-in-out;
        }

        .crop::before,
        .crop::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 10px;
            background: #66bb6a;
            border-radius: 50%;
        }

        .crop::before {
            top: 20px;
            left: -12px;
            transform: rotate(-30deg);
        }

        .crop::after {
            top: 40px;
            right: -12px;
            transform: rotate(30deg);
        }

        @keyframes sway {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

        /* 🌱 CROPS HEIGHT VARIATION */
        .crop:nth-child(1) { height: 120px; }
        .crop:nth-child(2) { height: 160px; }
        .crop:nth-child(3) { height: 140px; }
        .crop:nth-child(4) { height: 180px; }
        .crop:nth-child(5) { height: 130px; }
        .crop:nth-child(6) { height: 150px; }
        .crop:nth-child(7) { height: 110px; }
        .crop:nth-child(8) { height: 170px; }
        .crop:nth-child(9) { height: 125px; }
        .crop:nth-child(10) { height: 155px; }

        /* 🌿 UI */
        .center {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 420px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .upload-box {
            border: 3px dashed #2e7d32;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        input { display: none; }

        button {
            margin-top: 15px;
            background: #2e7d32;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

        #preview {
            margin-top: 10px;
            width: 200px;
            border-radius: 10px;
            display: none;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            color: #1b5e20;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 5px solid #c8e6c9;
            border-top: 5px solid #2e7d32;
            border-radius: 50%;
            margin: 10px auto;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

    <!-- 🌞 SUN -->
    <div class="sun"></div>

    <!-- 🌿 UI -->
    <div class="center">

        <label class="upload-box">
            📂 Upload Crop Image
            <input type="file" id="file" onchange="previewImage()">
        </label>

        <img id="preview">

        <div class="spinner" id="spinner"></div>

        <button onclick="upload()">🔍 Predict Crop</button>

        <div id="result"></div>
    </div>

    <!-- 🌍 GROUND -->
    <div class="ground"></div>

    <!-- 🌾 FIELD -->
    <div class="field">
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
        <div class="crop"></div>
    </div>

    <script>
        function previewImage() {
            let file = document.getElementById("file").files[0];

            if (file) {
                let reader = new FileReader();
                reader.onload = e => {
                    let img = document.getElementById("preview");
                    img.src = e.target.result;
                    img.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        }

        function upload() {
            let file = document.getElementById("file").files[0];

            if (!file) {
                alert("Select an image first!");
                return;
            }

            document.getElementById("spinner").style.display = "block";
            document.getElementById("result").innerText = "";

            let formData = new FormData();
            formData.append("file", file);

            fetch("http://localhost:8081/predict", {
                method: "POST",
                body: formData
            })
            .then(res => res.text())
            .then(data => {
                setTimeout(() => {
                    document.getElementById("spinner").style.display = "none";
                    document.getElementById("result").innerText = "🌱 " + data;
                }, 1000);
            });
        }
    </script>

</body>
</html>
