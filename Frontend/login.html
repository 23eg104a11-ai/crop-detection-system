<!DOCTYPE html>
<html>
<head>
    <title>Login 🌿</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            display: flex;
            height: 100vh;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            overflow: hidden;
        }

        /* 🌞 SUN */
        .sun {
            position: absolute;
            top: 40px;
            left: 18%;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #fff176, #fbc02d);
            border-radius: 50%;
            box-shadow: 0 0 70px rgba(255, 235, 59, 0.9);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* LEFT SIDE */
        .left {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 🌍 SOIL */
        .soil {
            width: 340px;
            height: 110px;
            background: linear-gradient(#4e342e, #3e2723);
            border-radius: 60px;
            position: relative;
            box-shadow: inset 0 10px 25px rgba(0,0,0,0.6);
        }

        /* 🌰 SEED */
        .seed {
            width: 18px;
            height: 18px;
            background: #8d6e63;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: -70px;
            transform: translateX(-50%);
            animation: drop 2s ease-in forwards;
        }

        @keyframes drop {
            0% { top: -70px; }
            100% { top: 40px; }
        }

        /* 🌱 STEM */
        .stem {
            width: 6px;
            height: 0;
            background: linear-gradient(#2e7d32, #1b5e20);
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
            animation: grow 2s 2s forwards;
        }

        @keyframes grow {
            from { height: 0; }
            to { height: 130px; }
        }

        /* 🍃 LEAVES */
        .leaf {
            width: 45px;
            height: 25px;
            background: linear-gradient(#66bb6a, #2e7d32);
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            z-index: 5;
        }

        /* LEFT LEAF */
        .leaf.left {
            left: 65px;
            bottom: 140px;
            transform: rotate(-35deg) scale(0.3);
            animation: showLeaf 1s 4s forwards;
        }

        /* RIGHT LEAF */
        .leaf.right {
            right: 65px;
            bottom: 140px;
            transform: rotate(35deg) scale(0.3);
            animation: showLeaf 1s 4s forwards;
        }

        /* TOP LEAF */
        .leaf.top {
            left: 50%;
            bottom: 175px;
            transform: translateX(-50%) scale(0.3);
            animation: showLeafTop 1s 4.5s forwards;
        }

        /* 🌿 ANIMATIONS */
        @keyframes showLeaf {
            0% { opacity: 0; transform: scale(0.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes showLeafTop {
            0% { opacity: 0; transform: translateX(-50%) scale(0.2); }
            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* RIGHT SIDE */
        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #2e7d32;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

    </style>
</head>

<body>

    <!-- 🌞 SUN -->
    <div class="sun"></div>

    <!-- LEFT ANIMATION -->
    <div class="left">
        <div class="soil">
            <div class="seed"></div>
            <div class="stem"></div>

            <!-- 🍃 3 LEAVES -->
            <div class="leaf left"></div>
            <div class="leaf right"></div>
            <div class="leaf top"></div>
        </div>
    </div>

    <!-- RIGHT LOGIN -->
    <div class="right">
        <div class="box">
            <h2>🌿 Farmer Login</h2>

            <input type="text" id="name" placeholder="Enter Name"><br>
            <input type="email" id="email" placeholder="Enter Email"><br>
            <input type="password" id="password" placeholder="Enter Password"><br>

            <button onclick="login()">Login</button>
        </div>
    </div>

    <script>
        function login() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;

            if(name === "" || email === "") {
                alert("Please fill all details");
                return;
            }

            localStorage.setItem("username", name);
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
